server:
  port: ${CCMS_TICKET_PORT:8087}

spring:
  application:
    name: ccms-ticket-service
  datasource:
    url: ${CCMS_TICKET_DB_URL:jdbc:postgresql://localhost:5432/nta_ccms}
    username: ${CCMS_TICKET_DB_USERNAME:postgres}
    password: ${CCMS_TICKET_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

ccms:
  digit:
    tenant-id: ${CCMS_TENANT_ID:pb.amritsar}
    workflow:
      base-url: ${CCMS_DIGIT_WORKFLOW_BASE_URL:http://localhost:8085/workflow}
      process-path: ${CCMS_DIGIT_WORKFLOW_PROCESS_PATH:/v1/process}
      transition-path: ${CCMS_DIGIT_WORKFLOW_TRANSITION_PATH:/v1/transition}
      process-code: ${CCMS_DIGIT_WORKFLOW_PROCESS_CODE:CCMS_TICKET}
    notification:
      enabled: ${CCMS_DIGIT_NOTIFICATION_ENABLED:false}
      base-url: ${CCMS_DIGIT_NOTIFICATION_BASE_URL:http://localhost:8091/notification}
      sms-path: ${CCMS_DIGIT_NOTIFICATION_SMS_PATH:/v1/sms/send}
      template-id: ${CCMS_DIGIT_NOTIFICATION_TEMPLATE_ID:ccms-ticket-status}
